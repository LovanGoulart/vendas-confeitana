{% extends "base.html" %}

{% block title %}Nova Venda - Doces Vendas{% endblock %}

{% block content %}
<div class="page-header">
    <h2>🛒 Nova Venda</h2>
</div>

<div class="card">
    <div class="form-group">
        <label>📦 Produto</label>
        <select id="produtoSelect" onchange="atualizarPreco()">
            <option value="">Selecione um produto</option>
            {% for produto in produtos %}
            <option value="{{ produto.id }}" data-preco="{{ produto.preco }}" data-nome="{{ produto.nome }}">
                {{ produto.nome }} - R$ {{ produto.preco|moeda_br }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>💰 Valor Unitário (R$)</label>
            <input type="text" id="valorVenda" placeholder="0,00" oninput="formatarInputMoeda(this); calcularTotal()">
        </div>
        <div class="form-group">
            <label>🔢 Quantidade</label>
            <input type="number" id="quantidadeVenda" value="1" min="1" oninput="calcularTotal()">
        </div>
    </div>

    <div class="form-group">
        <label>👤 Nome do Cliente</label>
        <input type="text" id="clienteVenda" placeholder="Nome do cliente">
    </div>

    <div class="form-group">
        <label>📅 Data da Venda</label>
        <input type="date" id="dataVendaInput" value="{{ data_iso }}">
    </div>

    <div class="form-group checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="vendaFiado" onchange="toggleFiado()">
            <span class="checkmark"></span>
            💳 Marcar como Fiado
        </label>
    </div>

    <div class="total-preview">
        <span>Total:</span>
        <strong id="totalVenda">R$ 0,00</strong>
    </div>

    <button class="btn btn-success btn-full" id="btnSalvar" onclick="salvarVenda()">✅ Confirmar Venda</button>
</div>

<div class="card">
    <h3>📝 Vendas do Dia</h3>
    <div class="form-group">
        <label>📅 Ver vendas de:</label>
        <input type="date" id="dataFiltro" value="{{ data_iso }}" onchange="carregarVendasDia()">
    </div>
    <div id="listaVendasHoje" class="lista-vendas">
        <p class="empty">Carregando...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let vendaEditando = null;

function formatarBr(valor) {
    return valor.toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function parseBr(valorStr) {
    if (!valorStr) return 0;
    return parseFloat(valorStr.replace(/\./g, "").replace(",", "."));
}

function formatarInputMoeda(input) {
    let valor = input.value.replace(/[^\d,]/g, "").replace(/\./g, "");
    if (valor.includes(",")) {
        let partes = valor.split(",");
        if (partes[1] && partes[1].length > 2) {
            partes[1] = partes[1].substring(0, 2);
            valor = partes.join(",");
        }
    }
    input.value = valor;
}

function atualizarPreco() {
    const select = document.getElementById('produtoSelect');
    const option = select.options[select.selectedIndex];
    if (option.value) {
        let preco = parseFloat(option.dataset.preco);
        document.getElementById('valorVenda').value = formatarBr(preco);
        calcularTotal();
    }
}

function calcularTotal() {
    const valor = parseBr(document.getElementById('valorVenda').value);
    const qtd = parseInt(document.getElementById('quantidadeVenda').value) || 0;
    const total = valor * qtd;
    document.getElementById('totalVenda').textContent = 'R$ ' + formatarBr(total);
}

function toggleFiado() {
    const isFiado = document.getElementById('vendaFiado').checked;
    const btn = document.getElementById('btnSalvar');
    if (vendaEditando) {
        btn.textContent = '💾 Salvar Edição';
        btn.className = 'btn btn-primary btn-full';
        return;
    }
    if (isFiado) {
        btn.textContent = '💳 Confirmar Fiado';
        btn.className = 'btn btn-warning btn-full';
    } else {
        btn.textContent = '✅ Confirmar Venda';
        btn.className = 'btn btn-success btn-full';
    }
}

function salvarVenda() {
    const select = document.getElementById('produtoSelect');
    const option = select.options[select.selectedIndex];

    if (!option.value) {
        alert('Selecione um produto!');
        return;
    }

    const cliente = document.getElementById('clienteVenda').value.trim();
    if (!cliente) {
        alert('Digite o nome do cliente!');
        return;
    }

    const dataInput = document.getElementById('dataVendaInput').value;
    if (!dataInput) {
        alert('Selecione a data!');
        return;
    }

    const partes = dataInput.split('-');
    const dataBr = partes[2] + '/' + partes[1] + '/' + partes[0];
    const isFiado = document.getElementById('vendaFiado').checked;
    const valorNumerico = parseBr(document.getElementById('valorVenda').value);

    const dados = {
        produto_id: option.value,
        produto_nome: option.dataset.nome,
        cliente: cliente,
        valor: valorNumerico,
        quantidade: document.getElementById('quantidadeVenda').value,
        data: dataBr,
        data_iso: dataInput,
        fiado: isFiado
    };

    // Se está editando, usar PUT
    if (vendaEditando) {
        fetch('/api/vendas/' + vendaEditando, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('✅ Venda atualizada com sucesso!');
                cancelarEdicao();
                carregarVendasDia();
            }
        });
        return;
    }

    // Nova venda
    fetch('/api/vendas', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(dados)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const msg = isFiado ? '✅ Fiado anotado com sucesso!' : '✅ Venda registrada com sucesso!';
            alert(msg);
            document.getElementById('clienteVenda').value = '';
            document.getElementById('quantidadeVenda').value = '1';
            document.getElementById('valorVenda').value = '';
            document.getElementById('vendaFiado').checked = false;
            toggleFiado();
            select.selectedIndex = 0;
            calcularTotal();
            carregarVendasDia();
        }
    });
}

function carregarVendasDia() {
    const dataIso = document.getElementById('dataFiltro').value;
    fetch('/api/vendas/dia/' + dataIso)
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById('listaVendasHoje');
        if (data.vendas.length === 0) {
            container.innerHTML = '<p class="empty">Nenhuma venda nesta data</p>';
            return;
        }

        let html = '';
        data.vendas.forEach(v => {
            html += `<div class="venda-item" id="venda-${v.id}">
                <div class="venda-info">
                    <strong>${v.cliente}</strong>
                    <span>${v.quantidade}x ${v.produto_nome}</span>
                    <span style="font-size:0.75rem;color:${v.is_fiado ? '#F39C12' : '#2ECC71'}">${v.is_fiado ? '💳 Fiado' : '💰 À vista'}</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="venda-valor">R$ ${formatarBr(v.total)}</div>
                    <button class="btn-icon" onclick="editarVenda(${v.id}, '${v.cliente}', '${v.produto_nome}', ${v.valor}, ${v.quantidade}, '${v.data_iso}', ${v.is_fiado}, ${v.produto_id})" title="Editar">✏️</button>
                    <button class="btn-icon" onclick="excluirVenda(${v.id})" title="Excluir">🗑️</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    });
}

function editarVenda(id, cliente, produtoNome, valor, quantidade, dataIso, isFiado, produtoId) {
    vendaEditando = id;

    // Preencher formulário
    document.getElementById('clienteVenda').value = cliente;
    document.getElementById('valorVenda').value = formatarBr(valor);
    document.getElementById('quantidadeVenda').value = quantidade;
    document.getElementById('dataVendaInput').value = dataIso;
    document.getElementById('vendaFiado').checked = isFiado;

    // Selecionar produto no select
    const select = document.getElementById('produtoSelect');
    for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].dataset.nome === produtoNome) {
            select.selectedIndex = i;
            break;
        }
    }

    toggleFiado();

    // Mudar botão para "Salvar Edição"
    const btn = document.getElementById('btnSalvar');
    btn.textContent = '💾 Salvar Edição';
    btn.className = 'btn btn-primary btn-full';

    // Adicionar botão cancelar se não existe
    if (!document.getElementById('btnCancelar')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'btnCancelar';
        cancelBtn.className = 'btn btn-danger btn-full';
        cancelBtn.style.marginTop = '10px';
        cancelBtn.textContent = '❌ Cancelar Edição';
        cancelBtn.onclick = cancelarEdicao;
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);
    }

    // Scroll para o topo
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function cancelarEdicao() {
    vendaEditando = null;

    // Limpar formulário
    document.getElementById('clienteVenda').value = '';
    document.getElementById('quantidadeVenda').value = '1';
    document.getElementById('valorVenda').value = '';
    document.getElementById('vendaFiado').checked = false;
    document.getElementById('produtoSelect').selectedIndex = 0;
    calcularTotal();
    toggleFiado();

    // Restaurar botão
    const btn = document.getElementById('btnSalvar');
    btn.textContent = '✅ Confirmar Venda';
    btn.className = 'btn btn-success btn-full';

    // Remover botão cancelar
    const cancelBtn = document.getElementById('btnCancelar');
    if (cancelBtn) cancelBtn.remove();
}

function excluirVenda(id) {
    if (!confirm('Tem certeza que deseja excluir esta venda?')) return;

    fetch('/api/vendas/' + id, {
        method: 'DELETE'
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('🗑️ Venda excluída com sucesso!');
            carregarVendasDia();
        }
    });
}

carregarVendasDia();
</script>
{% endblock %}
