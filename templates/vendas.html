{% extends "base.html" %}

{% block title %}Nova Venda - Doces Vendas{% endblock %}

{% block content %}
<div class="page-header">
    <h2>🛒 Nova Venda</h2>
</div>

<div class="card">
    <div class="form-group">
        <label>👤 Nome do Cliente</label>
        <input type="text" id="clienteVenda" placeholder="Nome do cliente">
    </div>

    <div class="form-group">
        <label>📅 Data da Venda</label>
        <input type="date" id="dataVendaInput" value="{{ data_iso }}">
    </div>

    <div class="form-group checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="vendaFiado" onchange="toggleFiado()">
            <span class="checkmark"></span>
            💳 Marcar como Fiado
        </label>
    </div>

    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">

    <h3>📦 Produtos da Venda</h3>

    <div class="form-group">
        <label>Adicionar Produto</label>
        <div style="display: flex; gap: 10px;">
            <select id="produtoSelect" style="flex: 1;" onchange="atualizarPrecoAdd()">
                <option value="">Produto</option>
                {% for produto in produtos %}
                <option value="{{ produto.id }}" data-preco="{{ produto.preco }}" data-nome="{{ produto.nome }}">
                    {{ produto.nome }} - R$ {{ produto.preco|moeda_br }}
                </option>
                {% endfor %}
            </select>
            <input type="number" id="qtdAdd" value="1" min="1" style="width: 50px;" placeholder="Qtd">
            <button class="btn btn-success" onclick="adicionarProduto()">➕ Adicionar</button>
        </div>
    </div>

    <div id="listaProdutosVenda" class="lista-produtos-venda" style="margin-top: 15px;">
        <p class="empty" id="msgVazio">Nenhum produto adicionado</p>
    </div>

    <div class="total-preview" style="margin-top: 20px;">
        <span>Total:</span>
        <strong id="totalVenda">R$ 0,00</strong>
    </div>

    <button class="btn btn-success btn-full" id="btnSalvar" onclick="salvarVenda()">✅ Confirmar Venda</button>
</div>

<div class="card">
    <h3>📝 Vendas do Dia</h3>
    <div class="form-group">
        <label>📅 Ver vendas de:</label>
        <input type="date" id="dataFiltro" value="{{ data_iso }}" onchange="carregarVendasDia()">
    </div>
    <div id="listaVendasHoje" class="lista-vendas">
        <p class="empty">Carregando...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let produtosVenda = [];
let vendaEditando = null;

function formatarBr(valor) {
    return valor.toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function parseBr(valorStr) {
    if (!valorStr) return 0;
    return parseFloat(valorStr.replace(/\./g, "").replace(",", "."));
}

function atualizarPrecoAdd() {
    // Apenas para referencia visual, o preco eh mostrado no select
}

function adicionarProduto() {
    const select = document.getElementById('produtoSelect');
    const option = select.options[select.selectedIndex];

    if (!option.value) {
        alert('Selecione um produto!');
        return;
    }

    const qtd = parseInt(document.getElementById('qtdAdd').value) || 1;
    const preco = parseFloat(option.dataset.preco);
    const nome = option.dataset.nome;
    const id = option.value;

    // Verificar se ja existe
    const existente = produtosVenda.find(p => p.produto_id == id);
    if (existente) {
        existente.quantidade += qtd;
        existente.total = existente.valor * existente.quantidade;
    } else {
        produtosVenda.push({
            produto_id: id,
            produto_nome: nome,
            valor: preco,
            quantidade: qtd,
            total: preco * qtd
        });
    }

    // Resetar select
    select.selectedIndex = 0;
    document.getElementById('qtdAdd').value = '1';

    renderizarProdutos();
}

function removerProduto(index) {
    produtosVenda.splice(index, 1);
    renderizarProdutos();
}

function renderizarProdutos() {
    const container = document.getElementById('listaProdutosVenda');

    if (produtosVenda.length === 0) {
        container.innerHTML = '<p class="empty" id="msgVazio">Nenhum produto adicionado</p>';
        document.getElementById('totalVenda').textContent = 'R$ 0,00';
        return;
    }

    let html = '';
    let totalGeral = 0;

    produtosVenda.forEach((p, index) => {
        totalGeral += p.total;
        html += `<div class="venda-item" style="background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <strong>${p.quantidade}x ${p.produto_nome}</strong>
                <div style="font-size: 0.85rem; color: #666;">R$ ${formatarBr(p.valor)} cada = R$ ${formatarBr(p.total)}</div>
            </div>
            <button class="btn-icon" onclick="removerProduto(${index})" title="Remover">🗑️</button>
        </div>`;
    });

    container.innerHTML = html;
    document.getElementById('totalVenda').textContent = 'R$ ' + formatarBr(totalGeral);
}

function toggleFiado() {
    const isFiado = document.getElementById('vendaFiado').checked;
    const btn = document.getElementById('btnSalvar');
    if (vendaEditando) {
        btn.textContent = '💾 Salvar Edicao';
        btn.className = 'btn btn-primary btn-full';
        return;
    }
    if (isFiado) {
        btn.textContent = '💳 Confirmar Fiado';
        btn.className = 'btn btn-warning btn-full';
    } else {
        btn.textContent = '✅ Confirmar Venda';
        btn.className = 'btn btn-success btn-full';
    }
}

function salvarVenda() {
    if (produtosVenda.length === 0) {
        alert('Adicione pelo menos um produto!');
        return;
    }

    const cliente = document.getElementById('clienteVenda').value.trim();
    if (!cliente) {
        alert('Digite o nome do cliente!');
        return;
    }

    const dataInput = document.getElementById('dataVendaInput').value;
    if (!dataInput) {
        alert('Selecione a data!');
        return;
    }

    const partes = dataInput.split('-');
    const dataBr = partes[2] + '/' + partes[1] + '/' + partes[0];
    const isFiado = document.getElementById('vendaFiado').checked;

    const dados = {
        cliente: cliente,
        data: dataBr,
        data_iso: dataInput,
        fiado: isFiado,
        produtos: produtosVenda
    };

    // Se esta editando, usar PUT
    if (vendaEditando) {
        fetch('/api/vendas/' + vendaEditando, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('✅ Venda atualizada com sucesso!');
                cancelarEdicao();
                carregarVendasDia();
            }
        });
        return;
    }

    // Nova venda
    fetch('/api/vendas', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(dados)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const msg = isFiado ? '✅ Fiado anotado com sucesso!' : '✅ Venda registrada com sucesso!';
            alert(msg);
            document.getElementById('clienteVenda').value = '';
            document.getElementById('vendaFiado').checked = false;
            toggleFiado();
            produtosVenda = [];
            renderizarProdutos();
            carregarVendasDia();
        }
    });
}

function carregarVendasDia() {
    const dataIso = document.getElementById('dataFiltro').value;
    fetch('/api/vendas/dia/' + dataIso)
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById('listaVendasHoje');
        if (data.vendas.length === 0) {
            container.innerHTML = '<p class="empty">Nenhuma venda nesta data</p>';
            return;
        }

        let html = '';
        data.vendas.forEach(v => {
            html += `<div class="venda-item" id="venda-${v.id}">
                <div class="venda-info">
                    <strong>${v.cliente}</strong>
                    <span>${v.quantidade}x ${v.produto_nome}</span>
                    <span style="font-size:0.75rem;color:${v.is_fiado ? '#F39C12' : '#2ECC71'}">${v.is_fiado ? '💳 Fiado' : '💰 A vista'}</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="venda-valor">R$ ${formatarBr(v.total)}</div>
                    <button class="btn-icon" onclick="editarVenda(${v.id}, '${v.cliente}', '${v.produto_nome}', ${v.valor}, ${v.quantidade}, '${v.data_iso}', ${v.is_fiado}, ${v.produto_id})" title="Editar">✏️</button>
                    <button class="btn-icon" onclick="excluirVenda(${v.id})" title="Excluir">🗑️</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    });
}

function editarVenda(id, cliente, produtoNome, valor, quantidade, dataIso, isFiado, produtoId) {
    vendaEditando = id;

    document.getElementById('clienteVenda').value = cliente;
    document.getElementById('dataVendaInput').value = dataIso;
    document.getElementById('vendaFiado').checked = isFiado;

    // Para edicao, adicionamos o produto na lista
    produtosVenda = [{
        produto_id: String(produtoId),
        produto_nome: produtoNome,
        valor: valor,
        quantidade: quantidade,
        total: valor * quantidade
    }];
    renderizarProdutos();

    toggleFiado();

    const btn = document.getElementById('btnSalvar');
    btn.textContent = '💾 Salvar Edicao';
    btn.className = 'btn btn-primary btn-full';

    if (!document.getElementById('btnCancelar')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'btnCancelar';
        cancelBtn.className = 'btn btn-danger btn-full';
        cancelBtn.style.marginTop = '10px';
        cancelBtn.textContent = '❌ Cancelar Edicao';
        cancelBtn.onclick = cancelarEdicao;
        btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);
    }

    window.scrollTo({top: 0, behavior: 'smooth'});
}

function cancelarEdicao() {
    vendaEditando = null;
    produtosVenda = [];
    renderizarProdutos();
    document.getElementById('clienteVenda').value = '';
    document.getElementById('vendaFiado').checked = false;
    document.getElementById('produtoSelect').selectedIndex = 0;
    toggleFiado();

    const btn = document.getElementById('btnSalvar');
    btn.textContent = '✅ Confirmar Venda';
    btn.className = 'btn btn-success btn-full';

    const cancelBtn = document.getElementById('btnCancelar');
    if (cancelBtn) cancelBtn.remove();
}

function excluirVenda(id) {
    if (!confirm('Tem certeza que deseja excluir esta venda?')) return;

    fetch('/api/vendas/' + id, {
        method: 'DELETE'
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('🗑️ Venda excluida com sucesso!');
            carregarVendasDia();
        }
    });
}

carregarVendasDia();
</script>
{% endblock %}
